<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yuka Cafe | Home</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Besley:ital,wght@0,400..900;1,400..900&family=Gaegu:wght@300;400;700&display=swap" rel="stylesheet">
<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="merch-nav">
            <a onclick="openShadowBox()">
                <div class="merch-img">
                    <img src="images/merch-seal.png"/>
                    <p>Merch</p>
                </div>
            </a>
        </div>
        <div class="logo">
            <a href="index.html">
                <img src="images/logo.png" alt="Yuka Cafe Logo" />
            </a>
        </div>
        <ul class="nav-links">
            <li><a href="faq.html">
                <div class="nav-img">
                    <img src="images/faq-seal.png"/>
                    <p>FAQ</p>
                </div>
            </a></li>
            <li><a href="about.html">
                <div class="nav-img">
                    <img src="images/about-seal.png"/>
                    <p>About</p>
                </div>
            </a></li>
            <li><a href="menu.html">
                <div class="nav-img">
                    <img src="images/menu-seal.png"/>
                    <p>Menu</p>
                </div>
            </a></li>
            <li><a onclick=openBag()>
                <div class="nav-img">
                    <img src="images/bag-seal.png"/>
                    <p>Bag</p>
                </div>
            </a></li>
        </ul>
    </nav>
    <div id="shadow-overlay" onclick="closeShadowBox()"></div>

    <div class="merch-box" id="shadow-box">
        <button class="close-btn" onclick="closeShadowBox()">✕</button>
        <h1>Merch Coming Soon...</h1>
        <h2>Stay Connected for Updates!</h2>
        <div class="socials">
            <button>
                <a href="https://www.instagram.com/yukacafe.la/" target="_blank">
                    <img src="images/insta-logo.png"/>
                    <p>@yukacafe.la</p>
                </a>
            </button>
        </div>
    </div>
  <!-- HEADER -->
   <header class = "hero-section">
        <img src="images/hero-img.png" alt = "Yuka Cafe Image" class = "hero-img"/>
        <a href="menu.html" class ="order-button"><img src="images/order-now-button.png" alt="Order Now"/></a>
   </header>
   <!-- FEATURED DRINKS -->
   <section class="ft-products">
    <h2>Featured Drinks</h2>
    <div class = "products">
        <div class="products-container">
            <div class="product-card">
                <img src="images/drink-img-filler.png" alt="The Yuka">
                <h3>Yuka</h3>
            </div>
            <div class="product-card">
                <img src="images/drink-img-filler.png" alt="Capybara">
                <h3>Capybara</h3>
            </div>
        </div>
    </div>
   </section>
   <div class="yuka-tape">
    <img src="images/yuka-tape.png"/>
   </div>
   <!-- BAG OVERLAY -->
    <div id="bag-overlay" class="bag-overlay hidden">
        <!--CART VIEW-->
        <div id="bag-panel" class="bag-panel">
        <div class="bag-header">
            <h2>Bag</h2>
        </div>
        <div id="bag-items"></div>
        <div class="bag-footer">
            <p id="bag-total"></p>
            <button class="checkout-btn" onclick=showPickupTime()>
            <img src="images/checkout-btn.png" alt="Checkout"/>
            </button>
        </div>
        </div>
        <!--PICKUP TIME VIEW-->
        <div class="pickup-view" id="pickup-view" style="display:none">
        <button class="back-to-bag-btn" onclick=showCart()><b>&lt</b> Back to Bag</button>
        <div class="pickup-time-content">
            <h1>Select Pickup Time</h1>
            <p>*Same day pick-up is unavailable</p>
            <select class="pickup-time-select" id="pickup-time-select"></select>
        </div>
        <button class="confirmation-button" onclick=checkout()>
            <img src="images/confirm-pay-btn.png" alt="Confirm & Pay"/>
        </button>
        </div>
    </div>
   <!--FOOTER-->
   <footer class="footer">
    <a href="index.html">
        <img src="images/logo.png" alt="Yuka Cafe Logo" />
    </a>
    <div class="contact-info">
        <h3>Yuka Cafe</h3>
        <p>yukacafe.la@gmail.com<br>insta: @yukacafe.la</p>
    </div>
    <div class="hours">
        <h3>Hours of Operation</h3>
        <p>Friday-Monday<br>10:00AM-3:00PM</p>
    </div>
    <a href="menu.html"><img src="images/order-now-footer.png"></a>
   </footer>
   <script src="customize.js"></script>
   <script src="bag.js"></script>
</body>
</html>
